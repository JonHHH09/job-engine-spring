spring:
  application:
    name: job-engine-spring
  main:
    banner-mode: off
    web-application-type: servlet
  ai:
    mcp:
      server:
        name: job-engine-spring
        version: "@project.version@"
        type: SYNC
        protocol: STREAMABLE
        stdio: false
        streamable-http:
          mcp-endpoint: /mcp
        annotation-scanner:
          enabled: true
  datasource:
    url: ${JOB_ENGINE_POSTGRES_URL:jdbc:postgresql://localhost:5432/job_engine}
    username: ${JOB_ENGINE_POSTGRES_USER:}
    password: ${JOB_ENGINE_POSTGRES_PASSWORD:}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    default-schema: profile
    schemas:
      - profile
      - document
      - job_schema
  threads:
    virtual:
      enabled: true

logging:
  level:
    root: OFF

server:
  address: ${JOB_ENGINE_MCP_BIND_ADDRESS:127.0.0.1}
  port: ${JOB_ENGINE_MCP_PORT:8080}

job-engine:
  mcp:
    transport: streamable-http
    containerized: ${JOB_ENGINE_MCP_CONTAINERIZED:false}
  document:
    import-root: ${JOB_ENGINE_DOCUMENT_IMPORT_ROOT:tmp/imports}
  cover-letter:
    postgres:
      enabled: ${JOB_ENGINE_COVER_LETTER_POSTGRES_ENABLED:true}
  pdf-generation:
    german-cover-letter-output-dir: ${JOB_ENGINE_GERMAN_COVER_LETTER_OUTPUT_DIR:tmp/generated-pdfs/german-cover-letter}
    # Completed cleanup audit rows are retained for 30 days, then deleted daily with a bounded per-run capacity.
    cleanup-completed-retention: ${JOB_ENGINE_CLEANUP_COMPLETED_RETENTION:30d}
    cleanup-retention-batch-size: ${JOB_ENGINE_CLEANUP_RETENTION_BATCH_SIZE:1000}
    cleanup-retention-max-batches-per-run: ${JOB_ENGINE_CLEANUP_RETENTION_MAX_BATCHES_PER_RUN:10}
    cleanup-retention-delay: ${JOB_ENGINE_CLEANUP_RETENTION_DELAY:PT24H}
    cleanup-retention-initial-delay: ${JOB_ENGINE_CLEANUP_RETENTION_INITIAL_DELAY:PT5M}
    # Health degrades when the oldest due task reaches five minutes or a task reaches three failed attempts.
    cleanup-health-oldest-due-threshold: ${JOB_ENGINE_CLEANUP_OLDEST_DUE_THRESHOLD:PT5M}
    cleanup-health-repeated-failure-attempts: ${JOB_ENGINE_CLEANUP_REPEATED_FAILURE_ATTEMPTS:3}
