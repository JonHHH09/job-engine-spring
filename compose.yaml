services:
  postgres:
    image: postgres:18-alpine@sha256:9a8afca54e7861fd90fab5fdf4c42477a6b1cb7d293595148e674e0a3181de15
    environment:
      POSTGRES_DB: ${JOB_ENGINE_POSTGRES_DB:-job_engine}
      POSTGRES_USER: ${JOB_ENGINE_POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${JOB_ENGINE_POSTGRES_PASSWORD:-postgres}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - postgres-data:/var/lib/postgresql

  mcp:
    profiles: ["manual-mcp"]
    image: ${MCP_IMAGE:-job-engine-spring:local}
    build:
      context: .
    stdin_open: true
    tty: false
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DOCKER_COMPOSE_ENABLED: "false"
      JOB_ENGINE_POSTGRES_URL: jdbc:postgresql://postgres:5432/${JOB_ENGINE_POSTGRES_DB:-job_engine}
      JOB_ENGINE_POSTGRES_USER: ${JOB_ENGINE_POSTGRES_USER:-postgres}
      JOB_ENGINE_POSTGRES_PASSWORD: ${JOB_ENGINE_POSTGRES_PASSWORD:-postgres}
      JOB_ENGINE_DOCUMENT_IMPORT_ROOT: /app/tmp/imports
    volumes:
      - ./tmp/imports:/app/tmp/imports:ro
      - ./tmp/generated-pdfs:/app/tmp/generated-pdfs

volumes:
  postgres-data:
