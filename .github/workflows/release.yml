name: Release MCP Container

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    name: Verify release artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Java
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Resolve release version
        id: release
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "push" && "${GITHUB_REF_TYPE}" == "tag" ]]; then
            RELEASE_TAG="${GITHUB_REF_NAME}"
            # Keep this SemVer subset aligned with scripts/release.sh.
            if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z][0-9A-Za-z-]*(\.[0-9A-Za-z][0-9A-Za-z-]*)*)?$ ]]; then
              echo "Release tags must use vMAJOR.MINOR.PATCH format, optionally with a prerelease suffix." >&2
              exit 1
            fi
            RELEASE_VERSION="${RELEASE_TAG#v}"
            PUBLISH_RELEASE=true
          else
            RELEASE_TAG="dry-run-${GITHUB_RUN_ID}"
            RELEASE_VERSION="0.0.1-SNAPSHOT"
            PUBLISH_RELEASE=false
          fi

          {
            echo "release_tag=$RELEASE_TAG"
            echo "release_version=$RELEASE_VERSION"
            echo "publish_release=$PUBLISH_RELEASE"
          } >> "$GITHUB_OUTPUT"
          echo "Resolved release tag: $RELEASE_TAG"
          echo "Resolved Maven version: $RELEASE_VERSION"

      - name: Enforce release tag targets current master
        if: ${{ steps.release.outputs.publish_release == 'true' }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.release_tag }}
        run: |
          AUTH_HEADER="$(printf 'AUTHORIZATION: basic %s' "$(printf 'x-access-token:%s' "$GITHUB_TOKEN" | base64 -w0)")"
          git -c "http.https://github.com/.extraheader=$AUTH_HEADER" fetch --no-tags origin master
          TAG_TARGET="$(git rev-list -n 1 "$RELEASE_TAG")"
          MASTER_TIP="$(git rev-parse origin/master)"

          if [[ "$TAG_TARGET" != "$MASTER_TIP" ]]; then
            echo "Release tag ${RELEASE_TAG} must point at the current origin/master tip." >&2
            echo "Tag target: ${TAG_TARGET}" >&2
            echo "Master tip:  ${MASTER_TIP}" >&2
            exit 1
          fi

      - name: Run full verification and build jar
        run: ./mvnw clean -Drevision="${{ steps.release.outputs.release_version }}" -Pintegration-tests verify

      - name: Upload release verification reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-verification-reports
          path: |
            target/surefire-reports/
            target/failsafe-reports/
            target/site/jacoco/
          if-no-files-found: ignore

      - name: Prepare versioned release jar
        shell: bash
        run: |
          SOURCE_JAR="target/job-engine-spring-${{ steps.release.outputs.release_version }}.jar"
          RELEASE_JAR="job-engine-spring-${{ steps.release.outputs.release_tag }}.jar"
          test -f "$SOURCE_JAR"
          cp "$SOURCE_JAR" "$RELEASE_JAR"

      - name: Create jar checksum
        run: sha256sum "job-engine-spring-${{ steps.release.outputs.release_tag }}.jar" > SHA256SUMS

      - name: Generate CycloneDX SBOM for verified jar
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          file: "target/job-engine-spring-${{ steps.release.outputs.release_version }}.jar"
          format: cyclonedx-json
          output-file: "job-engine-spring-${{ steps.release.outputs.release_tag }}.cdx.json"
          upload-artifact: false
          upload-release-assets: false

      - name: Generate SPDX SBOM for verified jar
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          file: "target/job-engine-spring-${{ steps.release.outputs.release_version }}.jar"
          format: spdx-json
          output-file: "job-engine-spring-${{ steps.release.outputs.release_tag }}.spdx.json"
          upload-artifact: false
          upload-release-assets: false

      - name: Set up QEMU for cross-platform verification
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.6.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v3.11.1

      - name: Build linux/amd64 release container image from verified jar
        run: |
          JAR_SHA256="$(cut -d ' ' -f1 SHA256SUMS)"
          docker buildx build \
            --platform linux/amd64 \
            --provenance=false \
            --load \
            -f Dockerfile.release \
            --build-arg JAR_FILE="target/job-engine-spring-${{ steps.release.outputs.release_version }}.jar" \
            --build-arg VERSION="${{ steps.release.outputs.release_version }}" \
            --build-arg SOURCE_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}" \
            --build-arg JAR_SHA256="$JAR_SHA256" \
            -t job-engine-spring:release-candidate-amd64 \
            .

      - name: Smoke-test linux/amd64 release image over Streamable HTTP and STDIO
        run: |
          MCP_IMAGE=job-engine-spring:release-candidate-amd64 docker compose up -d --wait postgres mcp
          python3 scripts/smoke-mcp-http.py --timeout 120
          docker compose stop mcp
          MCP_IMAGE=job-engine-spring:release-candidate-amd64 MCP_CONTAINER_BUILD=never python3 scripts/smoke-mcp-stdio.py --timeout 120 -- ./scripts/run-mcp-stdio-diag.sh

      - name: Build linux/arm64 release container image from verified jar
        run: |
          JAR_SHA256="$(cut -d ' ' -f1 SHA256SUMS)"
          docker buildx build \
            --platform linux/arm64 \
            --provenance=false \
            --load \
            -f Dockerfile.release \
            --build-arg JAR_FILE="target/job-engine-spring-${{ steps.release.outputs.release_version }}.jar" \
            --build-arg VERSION="${{ steps.release.outputs.release_version }}" \
            --build-arg SOURCE_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}" \
            --build-arg JAR_SHA256="$JAR_SHA256" \
            -t job-engine-spring:release-candidate-arm64 \
            .

      - name: Smoke-test linux/arm64 release image over Streamable HTTP and STDIO
        run: |
          MCP_IMAGE=job-engine-spring:release-candidate-arm64 docker compose up -d --wait postgres mcp
          python3 scripts/smoke-mcp-http.py --timeout 120
          docker compose stop mcp
          MCP_IMAGE=job-engine-spring:release-candidate-arm64 MCP_CONTAINER_BUILD=never python3 scripts/smoke-mcp-stdio.py --timeout 120 -- ./scripts/run-mcp-stdio-diag.sh

      - name: Record and export smoke-tested platform images
        run: |
          : > IMAGE-IDS
          for platform in linux/amd64 linux/arm64; do
            architecture="${platform#linux/}"
            image="job-engine-spring:release-candidate-${architecture}"
            image_id="$(docker image inspect "$image" --format '{{.Id}}')"
            printf '%s %s\n' "$platform" "$image_id" >> IMAGE-IDS
            docker image save "$image" | gzip -1 > "release-candidate-linux-${architecture}.tar.gz"
          done

      - name: Generate CycloneDX SBOM for smoke-tested linux/amd64 image
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: job-engine-spring:release-candidate-amd64
          format: cyclonedx-json
          output-file: "job-engine-spring-${{ steps.release.outputs.release_tag }}.amd64.image.cdx.json"
          upload-artifact: false
          upload-release-assets: false

      - name: Generate SPDX SBOM for smoke-tested linux/amd64 image
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: job-engine-spring:release-candidate-amd64
          format: spdx-json
          output-file: "job-engine-spring-${{ steps.release.outputs.release_tag }}.amd64.image.spdx.json"
          upload-artifact: false
          upload-release-assets: false

      - name: Generate CycloneDX SBOM for smoke-tested linux/arm64 image
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: job-engine-spring:release-candidate-arm64
          format: cyclonedx-json
          output-file: "job-engine-spring-${{ steps.release.outputs.release_tag }}.arm64.image.cdx.json"
          upload-artifact: false
          upload-release-assets: false

      - name: Generate SPDX SBOM for smoke-tested linux/arm64 image
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          image: job-engine-spring:release-candidate-arm64
          format: spdx-json
          output-file: "job-engine-spring-${{ steps.release.outputs.release_tag }}.arm64.image.spdx.json"
          upload-artifact: false
          upload-release-assets: false

      - name: Upload verified release artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: verified-release-artifacts
          path: |
            job-engine-spring-${{ steps.release.outputs.release_tag }}.jar
            SHA256SUMS
            job-engine-spring-${{ steps.release.outputs.release_tag }}.cdx.json
            job-engine-spring-${{ steps.release.outputs.release_tag }}.spdx.json
            IMAGE-IDS
            release-candidate-linux-amd64.tar.gz
            release-candidate-linux-arm64.tar.gz
            job-engine-spring-${{ steps.release.outputs.release_tag }}.amd64.image.cdx.json
            job-engine-spring-${{ steps.release.outputs.release_tag }}.amd64.image.spdx.json
            job-engine-spring-${{ steps.release.outputs.release_tag }}.arm64.image.cdx.json
            job-engine-spring-${{ steps.release.outputs.release_tag }}.arm64.image.spdx.json
          if-no-files-found: error

      - name: Compose cleanup
        if: always()
        run: docker compose down --remove-orphans

  publish:
    name: Publish release artifacts
    runs-on: ubuntu-latest
    needs: verify
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    timeout-minutes: 30
    permissions:
      contents: write
      packages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Resolve release version
        id: release
        shell: bash
        run: |
          RELEASE_TAG="${GITHUB_REF_NAME}"
          # Keep this SemVer subset aligned with scripts/release.sh.
          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z][0-9A-Za-z-]*(\.[0-9A-Za-z][0-9A-Za-z-]*)*)?$ ]]; then
            echo "Release tags must use vMAJOR.MINOR.PATCH format, optionally with a prerelease suffix." >&2
            exit 1
          fi
          RELEASE_VERSION="${RELEASE_TAG#v}"
          {
            echo "release_tag=$RELEASE_TAG"
            echo "release_version=$RELEASE_VERSION"
          } >> "$GITHUB_OUTPUT"

      - name: Download verified release artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: verified-release-artifacts

      - name: Load and verify smoke-tested platform images
        run: |
          gzip -dc release-candidate-linux-amd64.tar.gz | docker image load
          gzip -dc release-candidate-linux-arm64.tar.gz | docker image load
          while read -r platform expected_image_id; do
            architecture="${platform#linux/}"
            image="job-engine-spring:release-candidate-${architecture}"
            actual_image_id="$(docker image inspect "$image" --format '{{.Id}}')"
            if [[ "$actual_image_id" != "$expected_image_id" ]]; then
              echo "Loaded ${platform} image does not match the smoke-tested image." >&2
              echo "Expected: $expected_image_id" >&2
              echo "Actual:   $actual_image_id" >&2
              exit 1
            fi
          done < IMAGE-IDS

      - name: Set up QEMU for multi-platform publication
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.6.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v3.11.1

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Check Cosign install
        run: cosign version

      - name: Publish verified platform images and manifest index
        id: publish_image
        env:
          RELEASE_TAG: ${{ steps.release.outputs.release_tag }}
        run: |
          IMAGE_REPOSITORY=ghcr.io/${GITHUB_REPOSITORY,,}
          IMAGE_NAME="${IMAGE_REPOSITORY}:${RELEASE_TAG}"
          : > IMAGE-DIGESTS

          for platform in linux/amd64 linux/arm64; do
            architecture="${platform#linux/}"
            image="job-engine-spring:release-candidate-${architecture}"
            platform_tag="${IMAGE_NAME}-${architecture}"
            expected_image_id="$(awk -v platform="$platform" '$1 == platform { print $2 }' IMAGE-IDS)"
            actual_image_id="$(docker image inspect "$image" --format '{{.Id}}')"
            if [[ "$actual_image_id" != "$expected_image_id" ]]; then
              echo "${platform} image changed after smoke-test verification." >&2
              exit 1
            fi

            docker tag "$image" "$platform_tag"
            docker push "$platform_tag"

            remote_raw="$(docker buildx imagetools inspect --raw "$platform_tag")"
            remote_config_digest="$(printf '%s' "$remote_raw" | python3 -c 'import json,sys; print(json.load(sys.stdin)["config"]["digest"])')"
            if [[ "$remote_config_digest" != "$expected_image_id" ]]; then
              echo "Published ${platform} config does not match the smoke-tested image." >&2
              echo "Expected: $expected_image_id" >&2
              echo "Actual:   $remote_config_digest" >&2
              exit 1
            fi

            remote_manifest_digest="$(docker buildx imagetools inspect "$platform_tag" | awk '/^Digest:/ { print $2; exit }')"
            if [[ ! "$remote_manifest_digest" =~ ^sha256:[0-9a-f]{64}$ ]]; then
              echo "Could not resolve the immutable ${platform} manifest digest." >&2
              exit 1
            fi
            printf '%s %s@%s config=%s\n' "$platform" "$IMAGE_REPOSITORY" "$remote_manifest_digest" "$remote_config_digest" >> IMAGE-DIGESTS
          done

          amd64_image_ref="$(awk '$1 == "linux/amd64" { print $2 }' IMAGE-DIGESTS)"
          arm64_image_ref="$(awk '$1 == "linux/arm64" { print $2 }' IMAGE-DIGESTS)"
          tag_args=(-t "$IMAGE_NAME")
          if [[ "$RELEASE_TAG" != *-* ]]; then
            tag_args+=(-t "${IMAGE_REPOSITORY}:latest")
          fi
          docker buildx imagetools create "${tag_args[@]}" "$amd64_image_ref" "$arm64_image_ref"

          manifest_digest="$(docker buildx imagetools inspect "$IMAGE_NAME" | awk '/^Digest:/ { print $2; exit }')"
          if [[ ! "$manifest_digest" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            echo "Could not resolve the immutable multi-platform manifest digest." >&2
            exit 1
          fi
          docker buildx imagetools inspect --raw "$IMAGE_NAME" | python3 -c '
          import json
          import sys

          payload = json.load(sys.stdin)
          platforms = {
              "{}/{}".format(entry["platform"]["os"], entry["platform"]["architecture"])
              for entry in payload.get("manifests", [])
              if entry.get("platform", {}).get("os") == "linux"
          }
          required = {"linux/amd64", "linux/arm64"}
          if not required.issubset(platforms):
              raise SystemExit(f"Published image is missing required platforms: {sorted(required - platforms)}")
          print("Published platforms: " + ", ".join(sorted(platforms)))
          '
          if [[ "$RELEASE_TAG" != *-* ]]; then
            latest_digest="$(docker buildx imagetools inspect "${IMAGE_REPOSITORY}:latest" | awk '/^Digest:/ { print $2; exit }')"
            if [[ "$latest_digest" != "$manifest_digest" ]]; then
              echo "The latest tag does not reference the version tag's manifest list." >&2
              exit 1
            fi
          fi

          immutable_image_ref="${IMAGE_REPOSITORY}@${manifest_digest}"
          printf 'index %s\n' "$immutable_image_ref" >> IMAGE-DIGESTS
          {
            echo "image_repository=$IMAGE_REPOSITORY"
            echo "image_name=$IMAGE_NAME"
            echo "image_ref=$immutable_image_ref"
          } >> "$GITHUB_OUTPUT"

      - name: Sign immutable release image digest with Cosign
        env:
          COSIGN_YES: "true"
          IMAGE_REF: ${{ steps.publish_image.outputs.image_ref }}
        run: cosign sign "$IMAGE_REF"

      - name: Create provenance predicate
        env:
          RELEASE_TAG: ${{ steps.release.outputs.release_tag }}
          RELEASE_VERSION: ${{ steps.release.outputs.release_version }}
          IMAGE_REF: ${{ steps.publish_image.outputs.image_ref }}
        run: |
          runtime_base_ref="$(python3 -c 'import pathlib,re; text=pathlib.Path("Dockerfile.release").read_text(); match=re.search(r"^FROM\s+([^\s@]+)@sha256:([0-9a-f]{64})\s*$", text, re.MULTILINE); assert match, "Dockerfile.release must pin its runtime base by sha256 digest"; print(f"{match.group(1)}@sha256:{match.group(2)}")')"
          runtime_base_image="${runtime_base_ref%@sha256:*}"
          runtime_base_digest="${runtime_base_ref##*@sha256:}"
          runtime_base_purl="pkg:docker/${runtime_base_image/:/@}"
          maven_metadata="$(python3 - <<'PY'
          import pathlib
          import re

          properties = {}
          for line in pathlib.Path('.mvn/wrapper/maven-wrapper.properties').read_text().splitlines():
              line = line.strip()
              if line and not line.startswith('#') and '=' in line:
                  key, value = line.split('=', 1)
                  properties[key.strip()] = value.strip()

          distribution_url = properties.get('distributionUrl', '')
          match = re.search(r'/apache-maven/([^/]+)/apache-maven-\1-bin\.zip$', distribution_url)
          if not match:
              raise SystemExit('Unable to derive Maven version from wrapper distributionUrl')

          checksum = properties.get('distributionSha256Sum', '')
          if not re.fullmatch(r'[0-9a-fA-F]{64}', checksum):
              raise SystemExit('Maven wrapper distributionSha256Sum must be a SHA-256 digest')

          print(match.group(1), checksum.lower())
          PY
          )"
          read -r maven_version maven_checksum <<< "$maven_metadata"
          maven_purl="pkg:maven/org.apache.maven/apache-maven@${maven_version}"

          cat > provenance-predicate.json <<EOF
          {
            "builder": {
              "id": "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}/attempts/${GITHUB_RUN_ATTEMPT}"
            },
            "buildType": "https://github.com/JonHHH09/job-engine-spring/.github/workflows/release.yml@refs/heads/master",
            "invocation": {
              "configSource": {
                "uri": "git+${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}@${GITHUB_SHA}",
                "digest": {"sha1": "${GITHUB_SHA}"},
                "entryPoint": ".github/workflows/release.yml"
              },
              "parameters": {
                "releaseTag": "${RELEASE_TAG}",
                "releaseVersion": "${RELEASE_VERSION}",
                "imageRef": "${IMAGE_REF}"
              },
              "environment": {
                "workflowRef": "${GITHUB_WORKFLOW_REF}",
                "runId": "${GITHUB_RUN_ID}",
                "runAttempt": "${GITHUB_RUN_ATTEMPT}"
              }
            },
            "metadata": {
              "buildInvocationId": "${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}",
              "completeness": {"parameters": true, "environment": true, "materials": true},
              "reproducible": false
            },
            "materials": [
              {
                "uri": "git+${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}@${GITHUB_SHA}",
                "digest": {"sha1": "${GITHUB_SHA}"}
              },
              {
                "uri": "${runtime_base_purl}",
                "digest": {"sha256": "${runtime_base_digest}"}
              },
              {
                "uri": "${maven_purl}",
                "digest": {"sha256": "${maven_checksum}"}
              }
            ]
          }
          EOF

      - name: Attest immutable release image digest provenance
        env:
          COSIGN_YES: "true"
          IMAGE_REF: ${{ steps.publish_image.outputs.image_ref }}
        run: cosign attest --type slsaprovenance --predicate provenance-predicate.json "$IMAGE_REF"

      - name: Verify release image signature and SLSA provenance
        env:
          IMAGE_REF: ${{ steps.publish_image.outputs.image_ref }}
        run: |
          certificate_identity="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/.github/workflows/release.yml@${GITHUB_REF}"
          certificate_issuer="https://token.actions.githubusercontent.com"

          cosign verify \
            --certificate-identity "$certificate_identity" \
            --certificate-oidc-issuer "$certificate_issuer" \
            "$IMAGE_REF"
          cosign verify-attestation \
            --type slsaprovenance \
            --certificate-identity "$certificate_identity" \
            --certificate-oidc-issuer "$certificate_issuer" \
            "$IMAGE_REF"

      - name: Create GitHub release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          tag_name: ${{ steps.release.outputs.release_tag }}
          name: ${{ steps.release.outputs.release_tag }}
          generate_release_notes: true
          files: |
            job-engine-spring-${{ steps.release.outputs.release_tag }}.jar
            SHA256SUMS
            job-engine-spring-${{ steps.release.outputs.release_tag }}.cdx.json
            job-engine-spring-${{ steps.release.outputs.release_tag }}.spdx.json
            IMAGE-IDS
            release-candidate-linux-amd64.tar.gz
            release-candidate-linux-arm64.tar.gz
            job-engine-spring-${{ steps.release.outputs.release_tag }}.amd64.image.cdx.json
            job-engine-spring-${{ steps.release.outputs.release_tag }}.amd64.image.spdx.json
            job-engine-spring-${{ steps.release.outputs.release_tag }}.arm64.image.cdx.json
            job-engine-spring-${{ steps.release.outputs.release_tag }}.arm64.image.spdx.json
            IMAGE-DIGESTS

  dry-run-report:
    name: Report release dry run
    runs-on: ubuntu-latest
    needs: verify
    if: github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Download verified release artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: verified-release-artifacts

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Exercise keyless signature and provenance verification
        shell: bash
        run: |
          certificate_identity="${GITHUB_SERVER_URL}/${GITHUB_WORKFLOW_REF}"
          certificate_issuer="https://token.actions.githubusercontent.com"

          cat > dry-run-provenance.json <<EOF
          {
            "builder": {
              "id": "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            },
            "buildType": "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/.github/workflows/release.yml@${GITHUB_REF}",
            "invocation": {
              "configSource": {
                "uri": "git+${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}@${GITHUB_SHA}",
                "digest": {"sha1": "${GITHUB_SHA}"},
                "entryPoint": ".github/workflows/release.yml"
              },
              "parameters": {"dryRun": true},
              "environment": {"workflowRef": "${GITHUB_WORKFLOW_REF}"}
            },
            "metadata": {
              "buildInvocationId": "${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}",
              "completeness": {"parameters": true, "environment": true, "materials": true},
              "reproducible": false
            },
            "materials": [{
              "uri": "git+${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}@${GITHUB_SHA}",
              "digest": {"sha1": "${GITHUB_SHA}"}
            }]
          }
          EOF

          cosign sign-blob --yes --bundle dry-run-signature.bundle SHA256SUMS
          cosign verify-blob \
            --bundle dry-run-signature.bundle \
            --certificate-identity "$certificate_identity" \
            --certificate-oidc-issuer "$certificate_issuer" \
            SHA256SUMS

          cosign attest-blob --yes \
            --type slsaprovenance \
            --predicate dry-run-provenance.json \
            --bundle dry-run-attestation.bundle \
            SHA256SUMS
          cosign verify-blob-attestation \
            --type slsaprovenance \
            --bundle dry-run-attestation.bundle \
            --certificate-identity "$certificate_identity" \
            --certificate-oidc-issuer "$certificate_issuer" \
            SHA256SUMS

      - name: Report release dry run
        run: |
          {
            echo "Manual branch run completed verification only; no GitHub Release or GHCR package was published."
            echo "Dry-run artifacts include the versioned jar, SHA256SUMS, and CycloneDX/SPDX SBOMs for both smoke-tested Linux architectures."
            echo "After downloading the artifacts, verify the release jar checksum locally with:"
            echo "  sha256sum -c SHA256SUMS"
            echo "The dry run verifies keyless signature and provenance attestations for SHA256SUMS; it never publishes a registry manifest."
          } | tee -a "$GITHUB_STEP_SUMMARY"
