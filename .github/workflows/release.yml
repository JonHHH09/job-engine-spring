name: Release MCP Container

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    name: Verify release artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Java
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Resolve release version
        id: release
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            RELEASE_TAG="${GITHUB_REF_NAME}"
            # Keep this SemVer subset aligned with scripts/release.sh.
            if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z][0-9A-Za-z-]*(\.[0-9A-Za-z][0-9A-Za-z-]*)*)?$ ]]; then
              echo "Release tags must use vMAJOR.MINOR.PATCH format, optionally with a prerelease suffix." >&2
              exit 1
            fi
            RELEASE_VERSION="${RELEASE_TAG#v}"
            PUBLISH_RELEASE=true
          else
            RELEASE_TAG="dry-run-${GITHUB_RUN_ID}"
            RELEASE_VERSION="0.0.1-SNAPSHOT"
            PUBLISH_RELEASE=false
          fi

          {
            echo "release_tag=$RELEASE_TAG"
            echo "release_version=$RELEASE_VERSION"
            echo "publish_release=$PUBLISH_RELEASE"
          } >> "$GITHUB_OUTPUT"
          echo "Resolved release tag: $RELEASE_TAG"
          echo "Resolved Maven version: $RELEASE_VERSION"

      - name: Enforce release tag targets current master
        if: ${{ steps.release.outputs.publish_release == 'true' }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.release_tag }}
        run: |
          AUTH_HEADER="$(printf 'AUTHORIZATION: basic %s' "$(printf 'x-access-token:%s' "$GITHUB_TOKEN" | base64 -w0)")"
          git -c "http.https://github.com/.extraheader=$AUTH_HEADER" fetch --no-tags origin master
          TAG_TARGET="$(git rev-list -n 1 "$RELEASE_TAG")"
          MASTER_TIP="$(git rev-parse origin/master)"

          if [[ "$TAG_TARGET" != "$MASTER_TIP" ]]; then
            echo "Release tag ${RELEASE_TAG} must point at the current origin/master tip." >&2
            echo "Tag target: ${TAG_TARGET}" >&2
            echo "Master tip:  ${MASTER_TIP}" >&2
            exit 1
          fi

      - name: Run full verification and build jar
        run: ./mvnw clean -Drevision="${{ steps.release.outputs.release_version }}" -Pintegration-tests verify

      - name: Upload release verification reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-verification-reports
          path: |
            target/surefire-reports/
            target/failsafe-reports/
            target/site/jacoco/
          if-no-files-found: ignore

      - name: Prepare versioned release jar
        shell: bash
        run: |
          SOURCE_JAR="target/job-engine-spring-${{ steps.release.outputs.release_version }}.jar"
          RELEASE_JAR="job-engine-spring-${{ steps.release.outputs.release_tag }}.jar"
          test -f "$SOURCE_JAR"
          cp "$SOURCE_JAR" "$RELEASE_JAR"

      - name: Create jar checksum
        run: sha256sum "job-engine-spring-${{ steps.release.outputs.release_tag }}.jar" > SHA256SUMS

      - name: Generate CycloneDX SBOM for verified jar
        uses: anchore/sbom-action@f8bdd1d8ac5e901a77a92f111440fdb1b593736b # v0.20.6
        with:
          file: "target/job-engine-spring-${{ steps.release.outputs.release_version }}.jar"
          format: cyclonedx-json
          output-file: "job-engine-spring-${{ steps.release.outputs.release_tag }}.cdx.json"
          upload-artifact: false
          upload-release-assets: false

      - name: Generate SPDX SBOM for verified jar
        uses: anchore/sbom-action@f8bdd1d8ac5e901a77a92f111440fdb1b593736b # v0.20.6
        with:
          file: "target/job-engine-spring-${{ steps.release.outputs.release_version }}.jar"
          format: spdx-json
          output-file: "job-engine-spring-${{ steps.release.outputs.release_tag }}.spdx.json"
          upload-artifact: false
          upload-release-assets: false

      - name: Build release container image from verified jar
        run: |
          JAR_SHA256="$(cut -d ' ' -f1 SHA256SUMS)"
          docker build \
            --provenance=false \
            -f Dockerfile.release \
            --build-arg JAR_FILE="target/job-engine-spring-${{ steps.release.outputs.release_version }}.jar" \
            --build-arg VERSION="${{ steps.release.outputs.release_version }}" \
            --build-arg SOURCE_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}" \
            --build-arg JAR_SHA256="$JAR_SHA256" \
            -t job-engine-spring:release-candidate \
            .

      - name: Smoke-test release image
        run: MCP_IMAGE=job-engine-spring:release-candidate MCP_CONTAINER_BUILD=never python3 scripts/smoke-mcp-stdio.py --timeout 120 -- ./scripts/run-local-mcp-container.sh

      - name: Record image ID
        run: docker image inspect job-engine-spring:release-candidate --format '{{.Id}}' > IMAGE-ID

      - name: Export smoke-tested image
        run: docker image save job-engine-spring:release-candidate | gzip -1 > release-candidate-image.tar.gz

      - name: Upload verified release artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: verified-release-artifacts
          path: |
            job-engine-spring-${{ steps.release.outputs.release_tag }}.jar
            SHA256SUMS
            job-engine-spring-${{ steps.release.outputs.release_tag }}.cdx.json
            job-engine-spring-${{ steps.release.outputs.release_tag }}.spdx.json
            IMAGE-ID
            release-candidate-image.tar.gz
          if-no-files-found: error

      - name: Compose cleanup
        if: always()
        run: docker compose down --remove-orphans

  publish:
    name: Publish release artifacts
    runs-on: ubuntu-latest
    needs: verify
    if: startsWith(github.ref, 'refs/tags/')
    timeout-minutes: 30
    permissions:
      contents: write
      packages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Resolve release version
        id: release
        shell: bash
        run: |
          RELEASE_TAG="${GITHUB_REF_NAME}"
          # Keep this SemVer subset aligned with scripts/release.sh.
          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z][0-9A-Za-z-]*(\.[0-9A-Za-z][0-9A-Za-z-]*)*)?$ ]]; then
            echo "Release tags must use vMAJOR.MINOR.PATCH format, optionally with a prerelease suffix." >&2
            exit 1
          fi
          RELEASE_VERSION="${RELEASE_TAG#v}"
          {
            echo "release_tag=$RELEASE_TAG"
            echo "release_version=$RELEASE_VERSION"
          } >> "$GITHUB_OUTPUT"

      - name: Download verified release artifacts
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: verified-release-artifacts

      - name: Load smoke-tested release image
        run: |
          gzip -dc release-candidate-image.tar.gz | docker image load
          expected_image_id="$(tr -d '\r\n' < IMAGE-ID)"
          actual_image_id="$(docker image inspect job-engine-spring:release-candidate --format '{{.Id}}')"
          if [[ "$actual_image_id" != "$expected_image_id" ]]; then
            echo "Loaded image ID does not match the smoke-tested image." >&2
            echo "Expected: $expected_image_id" >&2
            echo "Actual:   $actual_image_id" >&2
            exit 1
          fi

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@ba7bc0a3fef59531c69a25acd34668d6d3fe6f22 # v4.1.0

      - name: Check Cosign install
        run: cosign version

      - name: Publish container image
        id: publish_image
        env:
          RELEASE_TAG: ${{ steps.release.outputs.release_tag }}
        run: |
          IMAGE_REPOSITORY=ghcr.io/${GITHUB_REPOSITORY,,}
          IMAGE_NAME="${IMAGE_REPOSITORY}:${RELEASE_TAG}"

          docker tag job-engine-spring:release-candidate "$IMAGE_NAME"
          docker push "$IMAGE_NAME"

          verified_image_id="$(tr -d '\r\n' < IMAGE-ID)"
          published_config_digest="$(docker manifest inspect "$IMAGE_NAME" | python3 -c 'import json,sys; print(json.load(sys.stdin)["config"]["digest"])')"
          if [[ "$published_config_digest" != "$verified_image_id" ]]; then
            echo "Published registry image config does not match the smoke-tested image." >&2
            echo "Expected: $verified_image_id" >&2
            echo "Actual:   $published_config_digest" >&2
            exit 1
          fi

          if [[ "$RELEASE_TAG" != *-* ]]; then
            docker tag job-engine-spring:release-candidate "${IMAGE_REPOSITORY}:latest"
            docker push "${IMAGE_REPOSITORY}:latest"
          fi

          immutable_image_ref="$(docker image inspect "$IMAGE_NAME" --format '{{index .RepoDigests 0}}')"
          echo "$immutable_image_ref" > IMAGE-DIGESTS
          {
            echo "image_repository=$IMAGE_REPOSITORY"
            echo "image_name=$IMAGE_NAME"
            echo "image_ref=$immutable_image_ref"
          } >> "$GITHUB_OUTPUT"

      - name: Sign immutable release image digest with Cosign
        env:
          COSIGN_YES: "true"
          IMAGE_REF: ${{ steps.publish_image.outputs.image_ref }}
        run: cosign sign "$IMAGE_REF"

      - name: Create provenance predicate
        env:
          RELEASE_TAG: ${{ steps.release.outputs.release_tag }}
          RELEASE_VERSION: ${{ steps.release.outputs.release_version }}
          IMAGE_REF: ${{ steps.publish_image.outputs.image_ref }}
        run: |
          cat > provenance-predicate.json <<EOF
          {
            "buildDefinition": {
              "buildType": "https://github.com/JonHHH09/job-engine-spring/.github/workflows/release.yml@refs/heads/master",
              "externalParameters": {
                "releaseTag": "${RELEASE_TAG}",
                "releaseVersion": "${RELEASE_VERSION}",
                "imageRef": "${IMAGE_REF}"
              },
              "internalParameters": {
                "workflowRef": "${GITHUB_WORKFLOW_REF}",
                "runId": "${GITHUB_RUN_ID}",
                "runAttempt": "${GITHUB_RUN_ATTEMPT}"
              },
              "resolvedDependencies": [
                {
                  "uri": "git+${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}@${GITHUB_SHA}",
                  "digest": {
                    "gitCommit": "${GITHUB_SHA}"
                  }
                },
                {
                  "uri": "pkg:docker/eclipse-temurin@25-jre",
                  "digest": {
                    "sha256": "d0eb1b9018b3044da1b7346f39e945f71095749853d69a3aa16b8c99dad9bb45"
                  }
                },
                {
                  "uri": "pkg:maven/org.apache.maven/apache-maven@3.9.16",
                  "digest": {
                    "sha256": "5af3b743dd8b876b5c45da33b676251e5f1687712644abb4ee519ca56e1d89ce"
                  }
                }
              ]
            },
            "runDetails": {
              "builder": {
                "id": "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}/attempts/${GITHUB_RUN_ATTEMPT}"
              },
              "metadata": {
                "invocationId": "${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
              }
            }
          }
          EOF

      - name: Attest immutable release image digest provenance
        env:
          COSIGN_YES: "true"
          IMAGE_REF: ${{ steps.publish_image.outputs.image_ref }}
        run: cosign attest --type slsaprovenance --predicate provenance-predicate.json "$IMAGE_REF"

      - name: Create GitHub release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          tag_name: ${{ steps.release.outputs.release_tag }}
          name: ${{ steps.release.outputs.release_tag }}
          generate_release_notes: true
          files: |
            job-engine-spring-${{ steps.release.outputs.release_tag }}.jar
            SHA256SUMS
            job-engine-spring-${{ steps.release.outputs.release_tag }}.cdx.json
            job-engine-spring-${{ steps.release.outputs.release_tag }}.spdx.json
            IMAGE-ID
            IMAGE-DIGESTS

  dry-run-report:
    name: Report release dry run
    runs-on: ubuntu-latest
    needs: verify
    if: ${{ !startsWith(github.ref, 'refs/tags/') }}
    permissions:
      contents: read
    steps:
      - name: Report release dry run
        run: |
          {
            echo "Manual branch run completed verification only; no GitHub Release or GHCR package was published."
            echo "Dry-run artifacts include the versioned jar, SHA256SUMS, CycloneDX SBOM, SPDX SBOM, IMAGE-ID, and the smoke-tested image tarball."
            echo "After downloading the artifacts, verify them locally with:"
            echo "  sha256sum -c SHA256SUMS"
            echo "  gzip -dc release-candidate-image.tar.gz | docker image load"
            printf '%s\n' "  test \"\$(docker image inspect job-engine-spring:release-candidate --format '{{.Id}}')\" = \"\$(tr -d '\\r\\n' < IMAGE-ID)\""
            echo "  MCP_IMAGE=job-engine-spring:release-candidate MCP_CONTAINER_BUILD=never python3 scripts/smoke-mcp-stdio.py --timeout 120 -- ./scripts/run-local-mcp-container.sh"
          } | tee -a "$GITHUB_STEP_SUMMARY"
