name: Release MCP Container

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and publish release artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Java
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Run full verification and build jar
        run: ./mvnw -Pintegration-tests verify

      - name: Prepare versioned release jar
        run: |
          test -f target/job-engine-spring-0.0.1-SNAPSHOT.jar
          cp target/job-engine-spring-0.0.1-SNAPSHOT.jar "job-engine-spring-${GITHUB_REF_NAME}.jar"

      - name: Create jar checksum
        run: sha256sum "job-engine-spring-${GITHUB_REF_NAME}.jar" > SHA256SUMS

      - name: Build release container image from verified jar
        run: |
          JAR_SHA256="$(cut -d ' ' -f1 SHA256SUMS)"
          docker build \
            -f Dockerfile.release \
            --build-arg VERSION="${GITHUB_REF_NAME}" \
            --build-arg SOURCE_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}" \
            --build-arg JAR_SHA256="$JAR_SHA256" \
            -t job-engine-spring:release-candidate \
            .

      - name: Smoke-test release image
        run: MCP_IMAGE=job-engine-spring:release-candidate MCP_CONTAINER_BUILD=never python3 scripts/smoke-mcp-stdio.py -- ./scripts/run-local-mcp-container.sh

      - name: Record image ID
        run: docker image inspect job-engine-spring:release-candidate --format '{{.Id}}' > IMAGE-ID

      - name: Report release dry run
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        run: echo "Manual branch run completed verification only; no artifacts were published."

      - name: Log in to GitHub Container Registry
        if: startsWith(github.ref, 'refs/tags/')
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish container image
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          IMAGE_REPOSITORY=ghcr.io/${GITHUB_REPOSITORY,,}
          IMAGE_NAME="${IMAGE_REPOSITORY}:${GITHUB_REF_NAME}"

          docker tag job-engine-spring:release-candidate "$IMAGE_NAME"
          docker push "$IMAGE_NAME"

          if [[ "${GITHUB_REF_NAME}" != *-* ]]; then
            docker tag job-engine-spring:release-candidate "${IMAGE_REPOSITORY}:latest"
            docker push "${IMAGE_REPOSITORY}:latest"
          fi

          docker image inspect "$IMAGE_NAME" --format '{{index .RepoDigests 0}}' > IMAGE-DIGESTS

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          files: |
            job-engine-spring-${{ github.ref_name }}.jar
            SHA256SUMS
            IMAGE-ID
            IMAGE-DIGESTS

      - name: Compose cleanup
        if: always()
        run: docker compose down -v --remove-orphans
