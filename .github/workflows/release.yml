name: Release MCP Container

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and publish release artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Java
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Resolve release version
        id: release
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            RELEASE_TAG="${GITHUB_REF_NAME}"
            if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
              echo "Release tags must use vMAJOR.MINOR.PATCH format, optionally with a prerelease suffix." >&2
              exit 1
            fi
            RELEASE_VERSION="${RELEASE_TAG#v}"
            PUBLISH_RELEASE=true
          else
            RELEASE_TAG="dry-run-${GITHUB_RUN_ID}"
            RELEASE_VERSION="0.0.1-SNAPSHOT"
            PUBLISH_RELEASE=false
          fi

          {
            echo "release_tag=$RELEASE_TAG"
            echo "release_version=$RELEASE_VERSION"
            echo "publish_release=$PUBLISH_RELEASE"
          } >> "$GITHUB_OUTPUT"
          echo "Resolved release tag: $RELEASE_TAG"
          echo "Resolved Maven version: $RELEASE_VERSION"

      - name: Run full verification and build jar
        run: ./mvnw -Drevision="${{ steps.release.outputs.release_version }}" -Pintegration-tests verify

      - name: Prepare versioned release jar
        shell: bash
        run: |
          SOURCE_JAR="target/job-engine-spring-${{ steps.release.outputs.release_version }}.jar"
          RELEASE_JAR="job-engine-spring-${{ steps.release.outputs.release_tag }}.jar"

      - name: Prepare versioned release jar
        run: |
          test -f target/job-engine-spring-0.0.1-SNAPSHOT.jar
          cp target/job-engine-spring-0.0.1-SNAPSHOT.jar "job-engine-spring-${GITHUB_REF_NAME}.jar"

      - name: Create jar checksum
        run: sha256sum "job-engine-spring-${GITHUB_REF_NAME}.jar" > SHA256SUMS

      - name: Build release container image from verified jar
        run: |
          JAR_SHA256="$(cut -d ' ' -f1 SHA256SUMS)"
          docker build \
            -f Dockerfile.release \
            --build-arg JAR_FILE="target/job-engine-spring-${{ steps.release.outputs.release_version }}.jar" \
            --build-arg VERSION="${{ steps.release.outputs.release_version }}" \
            --build-arg SOURCE_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}" \
            --build-arg JAR_SHA256="$JAR_SHA256" \
            -t job-engine-spring:release-candidate \
            .

      - name: Smoke-test release image
        run: MCP_IMAGE=job-engine-spring:release-candidate MCP_CONTAINER_BUILD=never python3 scripts/smoke-mcp-stdio.py -- ./scripts/run-local-mcp-container.sh

      - name: Record image ID
        run: docker image inspect job-engine-spring:release-candidate --format '{{.Id}}' > IMAGE-ID

      - name: Report release dry run
        if: ${{ steps.release.outputs.publish_release != 'true' }}
        run: echo "Manual branch run completed verification only; no GitHub Release or GHCR package was published."

      - name: Log in to GitHub Container Registry
        if: ${{ steps.release.outputs.publish_release == 'true' }}
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish container image
        if: ${{ steps.release.outputs.publish_release == 'true' }}
        env:
          RELEASE_TAG: ${{ steps.release.outputs.release_tag }}
        run: |
          IMAGE_REPOSITORY=ghcr.io/${GITHUB_REPOSITORY,,}
          IMAGE_NAME="${IMAGE_REPOSITORY}:${GITHUB_REF_NAME}"

          docker tag job-engine-spring:release-candidate "$IMAGE_NAME"
          docker push "$IMAGE_NAME"

          if [[ "${GITHUB_REF_NAME}" != *-* ]]; then
            docker tag job-engine-spring:release-candidate "${IMAGE_REPOSITORY}:latest"
            docker push "${IMAGE_REPOSITORY}:latest"
          fi

          docker image inspect "$IMAGE_NAME" --format '{{index .RepoDigests 0}}' > IMAGE-DIGESTS

      - name: Create GitHub release
        if: ${{ steps.release.outputs.publish_release == 'true' }}
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          name: ${{ steps.release.outputs.release_tag }}
          generate_release_notes: true
          files: |
            job-engine-spring-${{ github.ref_name }}.jar
            SHA256SUMS
            IMAGE-ID
            IMAGE-DIGESTS

      - name: Compose cleanup
        if: always()
        run: docker compose down -v --remove-orphans
