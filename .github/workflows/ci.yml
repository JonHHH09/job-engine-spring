name: CI

on:
  pull_request:
    branches:
      - development
      - master
  push:
    branches:
      - development
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-pipeline:
    name: Validate pipeline definitions
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - name: Check workflow syntax
        uses: docker://rhysd/actionlint@sha256:887a259a5a534f3c4f36cb02dca341673c6089431057242cdc931e9f133147e9 # 1.7.7

      - name: Check shell scripts
        uses: ludeeus/action-shellcheck@00cae500b08a931fb5698e11e79bfbd38e612a38 # 2.0.0
        with:
          scandir: scripts

      - name: Check and test Python operational helpers
        run: |
          python3 -m py_compile scripts/smoke-mcp-http.py scripts/smoke-mcp-stdio.py scripts/test-smoke-mcp-stdio.py scripts/verify-mcp-restored-data.py scripts/tests/test-verify-mcp-restored-data.py
          python3 scripts/test-smoke-mcp-stdio.py
          python3 scripts/tests/test-verify-mcp-restored-data.py

      - name: Test PostgreSQL operational scripts
        run: bash scripts/tests/run-postgres-ops-tests.sh

      - name: Validate Docker Compose configuration
        run: docker compose config >/tmp/job-engine-compose-config.yaml

      - name: Check whitespace
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
        shell: bash
        run: |
          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            git diff --check "$PR_BASE_SHA" "$GITHUB_SHA"
          elif [[ "$EVENT_NAME" == "push" && ! "$PUSH_BEFORE_SHA" =~ ^0+$ ]]; then
            git diff --check "$PUSH_BEFORE_SHA" "$GITHUB_SHA"
          else
            git show --check --format= "$GITHUB_SHA"
          fi

  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    if: github.event_name != 'push' || github.ref != 'refs/heads/master'
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Java
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Run unit tests
        run: ./mvnw test

      - name: Upload unit reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: unit-test-reports
          path: |
            target/surefire-reports/
            target/site/jacoco/
          if-no-files-found: ignore

  integration:
    name: Integration and coverage gate
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.ref == 'refs/heads/development' ||
      (github.event_name == 'pull_request' && github.base_ref == 'master')
    needs:
      - validate-pipeline
      - unit
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Java
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Check Docker
        run: docker version && docker compose version

      - name: Run integration tests and JaCoCo gate
        run: ./mvnw -Pintegration-tests verify

      - name: Upload integration reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: integration-test-and-coverage-reports
          path: |
            target/surefire-reports/
            target/failsafe-reports/
            target/site/jacoco/
          if-no-files-found: ignore

  container-mcp-smoke:
    name: Container MCP transport smoke
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.ref == 'refs/heads/development' ||
      (github.event_name == 'pull_request' && github.base_ref == 'master')
    needs:
      - validate-pipeline
      - unit
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Check Docker
        run: docker version && docker compose version

      - name: Build MCP image
        run: docker build -t job-engine-spring:ci .

      - name: Smoke-test persistent MCP over Streamable HTTP
        run: |
          MCP_IMAGE=job-engine-spring:ci docker compose up -d --wait postgres mcp
          python3 scripts/smoke-mcp-http.py --timeout 120

      - name: Smoke-test MCP over container STDIO
        run: MCP_IMAGE=job-engine-spring:ci MCP_CONTAINER_BUILD=never python3 scripts/smoke-mcp-stdio.py --timeout 120 -- ./scripts/run-mcp-stdio-diag.sh

      - name: Docker-backed disposable PostgreSQL backup/restore acceptance
        run: POSTGRES_OPS_TEST_MODE=1 MCP_IMAGE=job-engine-spring:ci bash scripts/tests/postgres-ops-integration.sh

      - name: Compose cleanup
        if: always()
        run: docker compose down --remove-orphans

  master-promotion:
    name: Master promotion guard
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'pull_request' &&
      github.base_ref == 'master' &&
      github.head_ref == 'development') ||
      (github.event_name == 'push' &&
      github.ref == 'refs/heads/master')
    needs:
      - validate-pipeline
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - name: Verify master matches development
        shell: bash
        run: |
          git fetch --no-tags origin development
          git merge-base --is-ancestor origin/development "$GITHUB_SHA"

          development_tree="$(git rev-parse 'origin/development^{tree}')"
          master_tree="$(git rev-parse "${GITHUB_SHA}^{tree}")"

          if [[ "$master_tree" != "$development_tree" ]]; then
            echo "::error::Master contains changes that are not identical to origin/development."
            echo "Plain master pushes are promotion-only and must not introduce master-only changes."
            git diff --stat origin/development "$GITHUB_SHA"
            exit 1
          fi

          echo "Master promotion candidate matches origin/development exactly. Heavy CI remains on development and release tags."
