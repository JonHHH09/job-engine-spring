name: CI

on:
  pull_request:
  push:
    branches:
      - development
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Java
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Run unit tests
        run: ./mvnw test

      - name: Check whitespace
        run: git diff --check

      - name: Upload unit reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: unit-test-reports
          path: |
            target/surefire-reports/
            target/site/jacoco/
          if-no-files-found: ignore

  integration:
    name: Integration and coverage gate
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Java
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Check Docker
        run: docker version && docker compose version

      - name: Run integration tests and JaCoCo gate
        run: ./mvnw -Pintegration-tests verify

      - name: Upload integration reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: integration-test-and-coverage-reports
          path: |
            target/surefire-reports/
            target/failsafe-reports/
            target/site/jacoco/
          if-no-files-found: ignore

  container-mcp-smoke:
    name: Container MCP STDIO smoke
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Check Docker
        run: docker version && docker compose version

      - name: Build MCP image
        run: docker build -t job-engine-spring:ci .

      - name: Smoke-test MCP over container STDIO
        run: MCP_IMAGE=job-engine-spring:ci MCP_CONTAINER_BUILD=never python3 scripts/smoke-mcp-stdio.py -- ./scripts/run-local-mcp-container.sh

      - name: Compose cleanup
        if: always()
        run: docker compose down -v --remove-orphans